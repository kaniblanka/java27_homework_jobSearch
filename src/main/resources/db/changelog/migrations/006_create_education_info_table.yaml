databaseChangeLog:
  - changeSet:
      id: 006
      author: Kanyshai
      changes:
        - createTable:
            tableName: education_info
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: resume_id
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_education_resume
                    references: resumes(id)
              - column:
                  name: institution
                  type: varchar(255)
              - column:
                  name: program
                  type: varchar(255)
              - column:
                  name: start_date
                  type: date
              - column:
                  name: end_date
                  type: date
              - column:
                  name: degree
                  type: varchar(100)