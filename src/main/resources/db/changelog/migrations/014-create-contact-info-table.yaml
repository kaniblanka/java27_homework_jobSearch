databaseChangeLog:
  - changeSet:
      id: 014-create-contact-info-table
      author: Kanyshai
      changes:
        - createTable:
            tableName: contact_info
            columns:
              - column:
                  name: id
                  type: BIGINT AUTO_INCREMENT
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: type_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: resume_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: value
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: contact_info
            baseColumnNames: type_id
            referencedTableName: contact_types
            referencedColumnNames: id
            constraintName: fk_contact_info_type

        - addForeignKeyConstraint:
            baseTableName: contact_info
            baseColumnNames: resume_id
            referencedTableName: resumes
            referencedColumnNames: id
            constraintName: fk_contact_info_resume