databaseChangeLog:
  - changeSet:
      id: 007
      author: Kanyshai
      changes:
        - createTable:
            tableName: work_experience_info
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: resume_id
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_work_resume
                    references: resumes(id)
              - column:
                  name: years
                  type: int
              - column:
                  name: company_name
                  type: varchar(255)
              - column:
                  name: position
                  type: varchar(255)
              - column:
                  name: responsibilities
                  type: varchar(1000)